# kit 専用 CI。run-smoke は kit 自身のテストであり導入先へは配布しない (導入先の台帳検証はローカル validator + Statuses API 自己申告で、GitHub ホストの CI ワークフローは生成しない)。
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # event_name を含めて push / pull_request が互いに cancel しないようにする
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/smoke/run-smoke.sh
